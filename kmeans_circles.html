<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K-Means on concentric circles (k=2)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{ --bg:#0c0f14; --panel:#141921; --panel-2:#1b212c; --line:rgba(255,255,255,.06);
    --ink:#e8ebef; --ink-dim:#8b95a4; --accent:#9fb4ff; }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:
      radial-gradient(1200px 700px at 80% -10%, rgba(90,209,200,.06), transparent 60%),
      radial-gradient(900px 600px at -5% 110%, rgba(255,122,144,.06), transparent 55%),
      var(--bg);
    color:var(--ink); font-family:"JetBrains Mono",ui-monospace,monospace;
    -webkit-font-smoothing:antialiased; height:100vh;
  }
  main{height:100%;display:flex;gap:18px;padding:22px;align-items:stretch}
  .stage{flex:1 1 560px;min-width:320px;background:var(--panel);
    border:1px solid var(--line);border-radius:14px;position:relative;overflow:hidden;
    box-shadow:0 20px 60px -30px rgba(0,0,0,.8);}
  canvas{display:block;width:100%;height:100%}
  .controls{flex:0 0 200px;display:flex;flex-direction:column;gap:12px;justify-content:center}
  .state{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px}
  .readout{display:flex;justify-content:space-between;align-items:baseline;padding:7px 0;border-bottom:1px dashed var(--line)}
  .readout:last-child{border-bottom:none}
  .readout .k{color:var(--ink-dim);font-size:11.5px}
  .readout .v{font-size:19px;font-weight:700}
  .readout .v.small{font-size:12px;font-weight:500}
  #status{color:var(--accent)}
  button{font-family:inherit;font-size:13px;color:var(--ink);background:var(--panel-2);
    border:1px solid var(--line);border-radius:10px;padding:13px 12px;cursor:pointer;
    transition:.15s border-color,.15s background,.1s transform;}
  button:hover{border-color:var(--accent);background:#222a37}
  button:active{transform:translateY(1px)}
  button.primary{background:linear-gradient(180deg,#27405f,#1d3047);border-color:#3a577d;
    color:#dfe9ff;font-weight:700}
  button.primary:hover{border-color:var(--accent)}
</style>
</head>
<body>
<main>
  <div class="stage"><canvas id="cv"></canvas></div>
  <div class="controls">
    <div class="state">
      <div class="readout"><span class="k">Iteration</span><span class="v" id="r-iter">0</span></div>
      <div class="readout"><span class="k">Inertia&nbsp;J</span><span class="v" id="r-J">—</span></div>
      <div class="readout"><span class="k">Status</span><span class="v small" id="status">random start</span></div>
    </div>
    <button class="primary" id="btn-start">▶ Start</button>
    <button id="btn-reset">↻ New random</button>
  </div>
</main>

const K = 2;
const CLUSTER = ['#5ad1c8','#ff7a90'];
const ASSIGN_HOLD = 520, GLIDE_DUR = 650, PAUSE = 320;

const cv = document.getElementById('cv'), ctx = cv.getContext('2d');
let dpr = Math.max(1, window.devicePixelRatio||1);

let pts = DATA.data;
let bounds = {};
let centroids = [], glideFrom = [], glideTo = [];
let trails = [], labels = [];
let iter = 0, J = 0, converged = false;
let phase = 'idle';
let assignStart = 0, glideStart = 0, lastEvent = 0, playing = false;

function dist2(a,b){return (a[0]-b[0])**2+(a[1]-b[1])**2;}
function ease(t){return t<.5 ? 2*t*t : 1-Math.pow(-2*t+2,2)/2;}
function computeBounds(){
  const xs=pts.map(p=>p[0]), ys=pts.map(p=>p[1]);
  const pad=0.06;
  const xr=Math.max(...xs)-Math.min(...xs), yr=Math.max(...ys)-Math.min(...ys);
  bounds={xmin:Math.min(...xs)-xr*pad,xmax:Math.max(...xs)+xr*pad,ymin:Math.min(...ys)-yr*pad,ymax:Math.max(...ys)+yr*pad};
}
function nearest(p){let b=0,bd=Infinity;for(let c=0;c<K;c++){const d=dist2(p,centroids[c]);if(d<bd){bd=d;b=c;}}return b;}
function assignStep(){let ch=false;for(let i=0;i<pts.length;i++){const c=nearest(pts[i]);if(labels[i]!==c){labels[i]=c;ch=true;}}return ch;}
function means(){const s=Array.from({length:K},()=>[0,0,0]);for(let i=0;i<pts.length;i++){const c=labels[i];s[c][0]+=pts[i][0];s[c][1]+=pts[i][1];s[c][2]++;}
  const m=[];for(let c=0;c<K;c++){m.push(s[c][2]>0?[s[c][0]/s[c][2],s[c][1]/s[c][2]]:pts[(Math.random()*pts.length)|0].slice());}return m;}
function computeJ(){let j=0;for(let i=0;i<pts.length;i++)if(labels[i]>=0)j+=dist2(pts[i],centroids[labels[i]]);return j;}

function status(t){document.getElementById('status').textContent=t;}
function updateReadout(){document.getElementById('r-iter').textContent=iter;
  document.getElementById('r-J').textContent = labels.some(l=>l>=0)?J.toFixed(2):'—';}
function setLabel(){document.getElementById('btn-start').textContent = playing?'⏸ Pause':(converged?'✓ done':'▶ Start');}

function randomStart(){
  computeBounds();
  const {xmin,xmax,ymin,ymax}=bounds;
  centroids = Array.from({length:K},()=>[xmin+Math.random()*(xmax-xmin), ymin+Math.random()*(ymax-ymin)]);
  trails = centroids.map(c=>[c.slice()]);
  labels = new Array(pts.length).fill(-1);
  iter=0; converged=false; phase='idle'; playing=false;
  assignStep(); J=computeJ();
  status('random start'); setLabel(); updateReadout();
}
function doAssign(now){
  const changed = assignStep();
  J = computeJ(); updateReadout();
  if(!changed && iter>0){converged=true; playing=false; status('converged in '+iter+' steps'); setLabel(); phase='idle'; return;}
  phase='assigning'; assignStart=now; status('assigning points…');
}
function startGlide(now){ glideFrom=centroids.map(c=>c.slice()); glideTo=means(); phase='gliding'; glideStart=now; status('moving centroids…'); }
function finishGlide(now){
  centroids = glideTo.map(c=>c.slice());
  for(let c=0;c<K;c++) trails[c].push(centroids[c].slice());
  iter++; J=computeJ(); updateReadout(); phase='idle'; lastEvent=now;
}

function resize(){
  const r = cv.parentElement.getBoundingClientRect();
  cv.width=r.width*dpr; cv.height=r.height*dpr; ctx.setTransform(dpr,0,0,dpr,0,0); draw();
}
function plotRect(){const r=cv.getBoundingClientRect();return {L:48,R:r.width-18,T:18,B:r.height-38,w:r.width,h:r.height};}
function toPx(p){           // EQUAL aspect so the circles stay circular
  const pr=plotRect(); const {xmin,xmax,ymin,ymax}=bounds;
  const s=Math.min((pr.R-pr.L)/(xmax-xmin),(pr.B-pr.T)/(ymax-ymin));
  const cx=(pr.L+pr.R)/2, cy=(pr.T+pr.B)/2;
  return [ cx+(p[0]-(xmin+xmax)/2)*s, cy-(p[1]-(ymin+ymax)/2)*s ];
}

function draw(){
  const pr=plotRect(); ctx.clearRect(0,0,pr.w,pr.h);
  const {xmin,xmax,ymin,ymax}=bounds;
  ctx.strokeStyle='rgba(255,255,255,.05)'; ctx.lineWidth=1; ctx.fillStyle='#5a6473'; ctx.font='10px "JetBrains Mono"';
  ctx.textAlign='center'; ctx.textBaseline='top';
  for(let g=0;g<=5;g++){
    const xv=xmin+(xmax-xmin)*g/5, yv=ymin+(ymax-ymin)*g/5;
    let a=toPx([xv,ymin]), b=toPx([xv,ymax]);
    ctx.beginPath();ctx.moveTo(a[0],a[1]);ctx.lineTo(b[0],b[1]);ctx.stroke();
    let c=toPx([xmin,yv]), d=toPx([xmax,yv]);
    ctx.beginPath();ctx.moveTo(c[0],c[1]);ctx.lineTo(d[0],d[1]);ctx.stroke();
    ctx.fillText(xv.toFixed(1), a[0], a[1]+6);
    ctx.textAlign='right';ctx.textBaseline='middle';ctx.fillText(yv.toFixed(1), c[0]-8, c[1]);ctx.textAlign='center';ctx.textBaseline='top';
  }
  ctx.fillStyle='#8b95a4'; ctx.font='11px "JetBrains Mono"';
  ctx.fillText('x', (pr.L+pr.R)/2, pr.B+16);
  ctx.save();ctx.translate(14,(pr.T+pr.B)/2);ctx.rotate(-Math.PI/2);ctx.fillText('y',0,0);ctx.restore();
  // trails + start markers
  for(let c=0;c<K;c++){
    ctx.strokeStyle=CLUSTER[c]; ctx.globalAlpha=.4; ctx.lineWidth=1.5; ctx.beginPath();
    trails[c].forEach((p,i)=>{const q=toPx(p); i?ctx.lineTo(q[0],q[1]):ctx.moveTo(q[0],q[1]);}); ctx.stroke();
    ctx.globalAlpha=.55; ctx.lineWidth=1.2; const s=toPx(trails[c][0]);
    ctx.beginPath();ctx.arc(s[0],s[1],5,0,7);ctx.stroke(); ctx.globalAlpha=1;
  }
  // points (1000 of them: small + translucent)
  for(let i=0;i<pts.length;i++){
    const q=toPx(pts[i]);
    ctx.fillStyle = labels[i]>=0?CLUSTER[labels[i]]:'#697080'; ctx.globalAlpha=.7;
    ctx.beginPath();ctx.arc(q[0],q[1],2.5,0,7);ctx.fill();
  }
  ctx.globalAlpha=1;
  // centroids
  for(let c=0;c<K;c++){
    const q=toPx(centroids[c]);
    ctx.shadowColor=CLUSTER[c]; ctx.shadowBlur=20; ctx.fillStyle=CLUSTER[c];
    ctx.beginPath();const s=10;
    ctx.moveTo(q[0],q[1]-s);ctx.lineTo(q[0]+s,q[1]);ctx.lineTo(q[0],q[1]+s);ctx.lineTo(q[0]-s,q[1]);ctx.closePath();ctx.fill();
    ctx.shadowBlur=0; ctx.lineWidth=2; ctx.strokeStyle='#0c0f14'; ctx.stroke();
    ctx.fillStyle='#0c0f14'; ctx.beginPath();ctx.arc(q[0],q[1],2,0,7);ctx.fill();
  }
}

document.getElementById('btn-start').onclick=()=>{
  if(converged) return;
  playing=!playing; setLabel();
  if(playing){ lastEvent = performance.now()-PAUSE; } else { status('paused'); }
};
document.getElementById('btn-reset').onclick=()=>randomStart();

function frame(now){
  if(phase==='gliding'){
    const t=Math.min(1,(now-glideStart)/GLIDE_DUR), e=ease(t);
    centroids = glideFrom.map((c,ci)=>[c[0]+(glideTo[ci][0]-c[0])*e, c[1]+(glideTo[ci][1]-c[1])*e]);
    if(t>=1) finishGlide(now);
  } else if(phase==='assigning'){
    if(now-assignStart>ASSIGN_HOLD) startGlide(now);
  } else if(playing && !converged){
    if(now-lastEvent>PAUSE) doAssign(now);
  }
  draw(); requestAnimationFrame(frame);
}
window.addEventListener('resize',resize);
randomStart(); resize(); requestAnimationFrame(frame);
